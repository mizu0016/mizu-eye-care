name: Build Android APK (Python Kivy)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # これが公式の「Buildozer Action」だよ！
      # さっきのエラーはスペルやバージョンの指定が古かったんだ。
      - name: Build with Buildozer
        uses: ArtemSerebrenninkov/buildozer-action@v1
        with:
          buildozer_version: stable
          python_version: 3.11

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mizu-eye-care-apk
          path: bin/*.apk
