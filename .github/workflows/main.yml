name: Build Android APK (Python Kivy)

# ビルドを開始するタイミング
on:
  push:
    branches: [ "main" ]  # mainブランチに保存されたら動く
  workflow_dispatch:      # Actionsタブから手動でボタンを押しても動く

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build with Buildozer
        uses: ArtemSerebrenninkov/buildozer-action@v1
        with:
          buildozer_version: stable
          python_version: 3.11

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mizu-eye-care-apk
          path: bin/*.apk
